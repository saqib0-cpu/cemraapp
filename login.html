<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
<header>
    <div class="containerr">
      <h1 class="my-services-title" data-en="PrimeFix Maintenance Services" data-ar="خدمات الصيانة من برايم فيكس">PrimeFix Maintenance Services</h1>

      <nav class="main-nav"> <ul class="d-flex flex-md-row justify-content-center align-items-center gap-3 m-0 p-0 list-unstyled">
          <li><a href="home.html" data-en="Home" data-ar="الرئيسية">Home</a></li>
          <li><a href="aboutus.html" data-en="About Us" data-ar="معلومات عنا">About Us</a></li>
          <li><a href="book.html" data-en="Book Services" data-ar="حجز الخدمات">Book Services</a></li>
          <li><a href="login.html" data-en="Login" data-ar="تسجيل الدخول">Login</a></li>
        </ul>
      </nav>

      <div class="header-buttons d-flex align-items-center gap-2"> <button id="langToggle" onclick="toggleLanguage()">عربي</button>
        <a href="https://wa.me/1234567890" target="_blank" class="whatsapp-btn" id="whatsappBtn" data-en="WhatsApp" data-ar="واتساب">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-icon" />
          <span>WhatsApp</span>
        </a>
      </div>
    </div>
  </header>

<div class="login-container">
  <div class="login-header">
    <h1 data-en="Welcome" data-ar="أهلاً وسهلاً">Welcome</h1>
    <p data-en="Please enter your credentials to login" data-ar="يرجى إدخال بيانات الاعتماد لتسجيل الدخول">
      Please enter your credentials to login
    </p>
  </div>

  <form id="loginForm">
    <div class="input-group">
      <label for="username" data-en="Username" data-ar="اسم المستخدم">Username</label>
      <input type="text" id="username" name="username" required />
    </div>

    <div class="input-group">
      <label for="password" data-en="Password" data-ar="كلمة المرور">Password</label>
      <input type="password" id="password" name="password" required />
    </div>

    <button type="submit" class="login-button" data-en="Login" data-ar="تسجيل الدخول">Login</button>
  </form>
</div>

<!-- ✅ JavaScript to handle form -->
<script>
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      alert('Please enter both username and password.');
      return;
    }

    try {
      const response = await fetch('http://localhost:8000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });

      if (response.ok) {
        const result = await response.json();
        alert(result.message); // e.g., "Login successful!"
        window.location.href = 'dashboard.html';
      } else if (response.status === 401) {
        alert('Invalid username or password.');
      } else {
        alert('Login failed. Please try again.');
      }
    } catch (error) {
      console.error('Login failed:', error);
      alert('Failed to connect to server. Is it running?');
    }
  });
</script>


  <script src="script.js"></script>
</body>
</html>
